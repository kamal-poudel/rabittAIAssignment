name: CI — Pull Request Checks

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  backend-checks:
    name: 🔧 Backend — Lint & Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Run ESLint
        run: npm run lint

      - name: ✅ Validate server starts (syntax check)
        run: node --check server.js && node --check app.js
        env:
          JWT_SECRET: ci_test_secret_for_syntax_check_only
          GEMINI_API_KEY: ci_placeholder
          EMAIL_USER: ci@example.com
          EMAIL_PASS: ci_placeholder

  # ─────────────────────────────────────────────────────────────
  frontend-checks:
    name: 🎨 Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Run ESLint
        run: npm run lint

      - name: 🏗️ Build production bundle
        run: npm run build
        env:
          VITE_API_URL: https://your-backend.onrender.com/api

      - name: 📊 Report build artifact size
        run: |
          echo "### 📦 Build Output" >> $GITHUB_STEP_SUMMARY
          du -sh dist/ >> $GITHUB_STEP_SUMMARY
          ls -lh dist/assets/ >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────
  docker-validate:
    name: 🐳 Docker — Build Validation
    runs-on: ubuntu-latest
    needs: backend-checks

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Build Docker image
        run: |
          docker build \
            --file backend/Dockerfile \
            --tag sales-insight-backend:ci-${{ github.sha }} \
            ./backend

      - name: 🏥 Verify image builds successfully
        run: docker image inspect sales-insight-backend:ci-${{ github.sha }}

  # ─────────────────────────────────────────────────────────────
  security-audit:
    name: 🔐 Security — Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Audit backend dependencies
        working-directory: ./backend
        run: npm audit --audit-level=high || true

      - name: 🔐 Audit frontend dependencies
        working-directory: ./frontend
        run: npm audit --audit-level=high || true
